name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-exe:
    name: Build EXE (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: powershell

      - name: Build exe with PyInstaller
        run: |
          npm run build-exe
        shell: powershell

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files\Inno Setup 7"
          npm run build-installer
        shell: powershell

      - name: Verify installer exists
        run: |
          if (-Not (Test-Path "Output\Setup_BintangOCRHanziPinyin.exe")) {
            throw "Installer missing: Output\Setup_BintangOCRHanziPinyin.exe"
          }
          Write-Output "Installer exists: Output\Setup_BintangOCRHanziPinyin.exe"
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BintangOCRHanziPinyin-Installer
          path: Output/Setup_BintangOCRHanziPinyin.exe
