name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-exe:
    name: Build EXE (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller
        shell: powershell

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --onefile --add-data "web;web" --name "BintangOCRHanziPinyin" main.py
        shell: powershell

      - name: Compile Inno Setup Installer
        run: |
          iscc setup.iss
        shell: powershell

      - name: Show produced artifacts
        run: |
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse
          } else {
            Write-Output "no dist folder found"
          }
          if (Test-Path Output) {
            Get-ChildItem -Path Output -Recurse
          } else {
            Write-Output "no Output folder found"
          }
        shell: powershell

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: BintangOCRHanziPinyin-Installer
          path: Output/Setup_BintangOCRHanziPinyin.exe
